<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stress Relief</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FFF8F0;min-height:100vh}
.wrap{padding:16px;max-width:420px;margin:0 auto}
.title{font-size:26px;font-weight:700;color:#2D2D2D;text-align:center;padding:16px 0 4px}
.sub{font-size:14px;color:#888;text-align:center;margin-bottom:24px}
.section-title{font-size:16px;font-weight:600;color:#2D2D2D;margin:0 0 14px}
.divider{height:1px;background:#E5E5E5;margin:20px 0}

.switch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:4px}
.switch-card{background:#fff;border:1.5px solid #E5E5E5;border-radius:16px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:border-color .2s,box-shadow .2s}
.switch-card.on{box-shadow:0 0 0 3px rgba(0,0,0,0.06)}
.switch-label{font-size:14px;font-weight:600;color:#888;text-align:center;transition:color .2s}
.switch-card.on .switch-label{color:#2D2D2D}

.switch-body{width:54px;height:94px;border-radius:27px;background:#D1D1D1;border:2px solid #bbb;position:relative;transition:background .2s,border-color .2s;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:7px 0}
.switch-nub{width:40px;height:40px;border-radius:50%;background:#fff;border:2px solid #bbb;position:absolute;left:50%;transform:translateX(-50%);transition:top .2s cubic-bezier(.4,1.5,.6,1),border-color .2s,box-shadow .2s;top:5px}
.switch-card.on .switch-nub{top:calc(100% - 45px)}

.sw-on-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;position:absolute;top:7px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity .2s;white-space:nowrap}
.sw-off-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:#aaa;position:absolute;bottom:7px;left:50%;transform:translateX(-50%);transition:opacity .2s;white-space:nowrap}
.switch-card.on .sw-on-lbl{opacity:1}
.switch-card.on .sw-off-lbl{opacity:0}

.lock-badge{font-size:11px;background:#F3F3F3;border-radius:20px;padding:3px 10px;color:#999;font-weight:500}

.bubble-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px}
.bubble{width:100%;aspect-ratio:1;border-radius:50%;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s,opacity .15s;display:block}
.bubble:active{transform:scale(1.2)}

.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.slider-row label{font-size:13px;color:#888;white-space:nowrap}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:#D1D1D1;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#8B5CF6;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.val-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.val-row span{font-size:14px;color:#888}
.val-row strong{font-size:22px;font-weight:700;color:#8B5CF6}
.test-btn{display:block;width:100%;border:none;border-radius:28px;height:50px;background:#8B5CF6;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:20px;-webkit-tap-highlight-color:transparent;transition:transform .1s,opacity .1s}
.test-btn:active{transform:scale(0.96);opacity:0.9}

.premium-banner{border-radius:16px;border:2px solid #F59E0B;background:#FFF8E1;padding:16px;text-align:center;margin-bottom:32px}
.premium-banner h3{font-size:16px;font-weight:700;color:#7A4F00;margin-bottom:6px}
.premium-banner p{font-size:13px;color:#92620A;margin-bottom:14px;line-height:1.5}
.buy-btn{border:none;border-radius:24px;background:#F59E0B;color:#fff;font-size:15px;font-weight:600;padding:10px 28px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.buy-btn:active{transform:scale(0.96)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;font-size:14px;padding:8px 20px;border-radius:24px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="wrap">
  <div class="title">😌 Stress Relief</div>
  <div class="sub">Activa el switch y senti la vibracion</div>

  <div class="section-title">🎛️ Vibraciones</div>
  <div class="switch-grid" id="switchGrid"></div>

  <div class="divider"></div>

  <div class="section-title">🫧 Reventa burbujas</div>
  <div class="bubble-grid" id="bubbleGrid"></div>

  <div class="divider"></div>

  <div class="section-title">🎚️ Intensidad personalizada</div>
  <div class="slider-row">
    <label>Leve</label>
    <input type="range" min="1" max="100" value="50" step="1" id="slider" oninput="document.getElementById('sliderVal').textContent=this.value">
    <label>Fuerte</label>
  </div>
  <div class="val-row"><span>Intensidad:</span><strong id="sliderVal">50</strong></div>
  <button class="test-btn" onclick="testVib()">📳 Probar vibracion</button>

  <div class="premium-banner" id="premiumBanner">
    <h3>✨ Desbloquea el modo Premium</h3>
    <p>Vibraciones Pulso y Zap incluidas.<br>Pago unico de $1.99</p>
    <button class="buy-btn" onclick="activatePremium()">Comprar ahora</button>
  </div>
</div>

<script>
const SWITCHES=[
  {id:'soft',  label:'Suave',  color:'#6EC6F5', pattern:[0,80],             premium:false},
  {id:'med',   label:'Media',  color:'#A78BFA', pattern:[0,150],            premium:false},
  {id:'strong',label:'Fuerte', color:'#F97316', pattern:[0,80,60,80],       premium:false},
  {id:'pulse', label:'Pulso',  color:'#34D399', pattern:[0,50,50,50,50,50], premium:true},
  {id:'zap',   label:'Zap',    color:'#F43F5E', pattern:[0,200,100,200],    premium:true},
];
const BUBBLE_COLORS=['#60A5FA','#A78BFA','#F472B6','#34D399','#FBBF24','#F97316'];
let premium=false;
const states={};

function vibrate(p){if('vibrate' in navigator)navigator.vibrate(p);}

function buildSwitches(){
  const grid=document.getElementById('switchGrid');
  SWITCHES.forEach(sw=>{
    states[sw.id]=false;
    const card=document.createElement('div');
    card.className='switch-card';
    card.id='card-'+sw.id;
    card.innerHTML=`
      <div class="switch-label">${sw.label}</div>
      <div class="switch-body" id="body-${sw.id}">
        <span class="sw-on-lbl" style="color:${sw.color}" id="onlbl-${sw.id}">ON</span>
        <div class="switch-nub" id="nub-${sw.id}"></div>
        <span class="sw-off-lbl">OFF</span>
      </div>
      ${sw.premium?`<span class="lock-badge" id="lock-${sw.id}">🔒 Premium</span>`:''}
    `;
    card.addEventListener('click',()=>toggleSwitch(sw));
    grid.appendChild(card);
  });
}

function toggleSwitch(sw){
  if(sw.premium&&!premium){
    showToast('Activa Premium para usar esto');
    const card=document.getElementById('card-'+sw.id);
    card.animate([{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(-3px)'},{transform:'translateX(0)'}],{duration:250});
    return;
  }
  states[sw.id]=!states[sw.id];
  const card=document.getElementById('card-'+sw.id);
  const body=document.getElementById('body-'+sw.id);
  const nub=document.getElementById('nub-'+sw.id);
  if(states[sw.id]){
    card.classList.add('on');
    card.style.borderColor=sw.color;
    body.style.background=sw.color+'44';
    body.style.borderColor=sw.color;
    nub.style.borderColor=sw.color;
    nub.style.boxShadow='0 0 0 4px '+sw.color+'33';
    vibrate(sw.pattern);
    showToast(sw.label+' — ON');
    setTimeout(()=>{
      if(states[sw.id]){
        states[sw.id]=false;
        card.classList.remove('on');
        card.style.borderColor='';
        body.style.background='';
        body.style.borderColor='';
        nub.style.borderColor='';
        nub.style.boxShadow='';
      }
    },1200);
  } else {
    card.classList.remove('on');
    card.style.borderColor='';
    body.style.background='';
    body.style.borderColor='';
    nub.style.borderColor='';
    nub.style.boxShadow='';
    showToast(sw.label+' — OFF');
  }
}

function buildBubbles(){
  const grid=document.getElementById('bubbleGrid');
  for(let i=0;i<12;i++){
    const b=document.createElement('button');
    b.className='bubble';
    b.style.background=BUBBLE_COLORS[i%BUBBLE_COLORS.length];
    b.addEventListener('click',function(){
      vibrate([0,60]);
      b.style.transform='scale(1.3)';
      b.style.opacity='0';
      b.disabled=true;
      setTimeout(()=>{
        b.style.transition='none';
        b.style.transform='scale(0)';
        b.style.opacity='1';
        setTimeout(()=>{
          b.style.transition='transform .3s,opacity .3s';
          b.style.transform='scale(1)';
          b.disabled=false;
        },120);
      },220);
    });
    grid.appendChild(b);
  }
}

function testVib(){
  const v=parseInt(document.getElementById('slider').value);
  vibrate([0,Math.round(50+v*3)]);
  showToast('Vibracion intensidad '+v);
}

function activatePremium(){
  premium=true;
  document.getElementById('premiumBanner').style.display='none';
  SWITCHES.filter(s=>s.premium).forEach(s=>{
    const lk=document.getElementById('lock-'+s.id);
    if(lk)lk.style.display='none';
  });
  showToast('Premium activado! 🎉');
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}

buildSwitches();
buildBubbles();
</script>
</body>
</html>
